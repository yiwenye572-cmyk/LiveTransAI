<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>同声传译 · LiveTransAI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <div class="header-title-row">
            <h1>LiveTransAI</h1>
            <span id="session-scenario-chip" class="session-scenario-chip hidden"></span>
            <span id="session-config-pill" class="session-config-pill hidden">术语已加载</span>
          </div>
          <p class="subtitle" id="app-subtitle">AI 同声传译助手</p>
        </div>
        <div class="header-actions">
          <div id="status-badge" class="status-badge status-ready">就绪</div>
          <a id="btn-glossary-view" class="header-link" href="/setup-view.html">会话配置</a>
          <a class="header-link" href="/metrics.html">指标检测</a>
          <button id="btn-history" type="button" class="btn-header-secondary">历史</button>
          <button id="btn-new-session" type="button" class="btn-header-secondary">开始新翻译</button>
        </div>
      </header>

      <main class="main-grid">
        <aside class="left-column">
          <section id="summary-panel" class="summary-panel panel-accent-summary">
            <div class="summary-header">
              <h2>会话摘要</h2>
              <span id="summary-meta" class="summary-meta">会话主题将在翻译开始后自动生成</span>
            </div>
            <div id="summary-topic" class="summary-topic">主题：—</div>
            <div class="summary-scroll">
              <div id="summary-terms" class="summary-terms"></div>
              <ul id="summary-bullets" class="summary-bullets"></ul>
            </div>
          </section>

          <section id="formatted-panel" class="formatted-panel panel-accent-formatted">
            <div class="formatted-header">
              <h2>规整译文</h2>
              <span id="formatted-meta" class="formatted-meta">翻译结束后展示</span>
            </div>
            <div id="formatted-content" class="formatted-content">
              <div class="empty-state">翻译结束后，纠错后的完整段落将在此展示</div>
            </div>
          </section>
        </aside>

        <section class="subtitle-panel">
          <div class="subtitle-panel-toolbar">
            <div id="subtitle-metrics-bar" class="subtitle-metrics-bar hidden">已翻译: 0 句</div>
            <div class="subtitle-panel-toolbar-actions">
              <button
                id="btn-focus-summary"
                type="button"
                class="btn-focus-summary hidden"
                aria-expanded="false"
                title="展开/收起会话摘要"
              >
                摘要 ▾
              </button>
              <button
                id="btn-subtitle-settings"
                type="button"
                class="btn-subtitle-settings hidden"
                title="专注模式字幕显示设置"
              >
                设置
              </button>
              <button
                id="btn-subtitle-focus"
                type="button"
                class="btn-subtitle-focus"
                aria-pressed="false"
                title="隐藏摘要与控制区，放大字幕"
              >
                专注字幕
              </button>
            </div>
          </div>
          <section id="focus-summary-drawer" class="focus-summary-drawer" aria-hidden="true">
            <div class="focus-summary-drawer-inner summary-panel panel-accent-summary">
              <div class="summary-header">
                <h2>会话摘要</h2>
                <span id="focus-summary-meta" class="summary-meta">会话主题将在翻译开始后自动生成</span>
              </div>
              <div id="focus-summary-topic" class="summary-topic">主题：—</div>
              <div class="summary-scroll">
                <div id="focus-summary-terms" class="summary-terms"></div>
                <ul id="focus-summary-bullets" class="summary-bullets"></ul>
              </div>
            </div>
          </section>
          <div id="subtitle-list" class="subtitle-list"></div>
        </section>
      </main>

      <footer class="footer">
        <section id="audio-route-panel" class="audio-route-panel">
          <div id="audio-route-controls" class="audio-route-controls">
            <label class="audio-route-field">
              <span class="audio-route-label">监听设备</span>
              <select id="loopback-select" class="audio-route-select"></select>
            </label>
            <label class="audio-route-field">
              <span class="audio-route-label">译文输出</span>
              <select id="tts-output-select" class="audio-route-select"></select>
            </label>
          </div>
          <p id="audio-route-status" class="audio-route-status hidden"></p>
          <details id="audio-route-hint-wrap" class="audio-hint-details">
            <summary>如何设置监听设备？</summary>
            <p id="audio-route-hint" class="audio-route-hint"></p>
          </details>
        </section>
        <div id="metrics-bar" class="metrics-bar">已翻译: 0 句</div>
        <div class="controls">
          <button id="btn-tts" type="button" class="btn-tts" aria-pressed="false" title="播放豆包同声传译中文语音">语音关</button>
          <button id="btn-start" type="button">开始翻译</button>
          <button id="btn-pause" type="button" class="btn-secondary" disabled>暂停</button>
          <button id="btn-stop" type="button" class="btn-secondary" disabled>停止</button>
        </div>
      </footer>
    </div>

    <div id="subtitle-settings-overlay" class="subtitle-settings-overlay hidden" aria-hidden="true">
      <div class="subtitle-settings-panel">
        <div class="subtitle-settings-header">
          <h2>字幕设置</h2>
          <button id="btn-subtitle-settings-close" type="button" class="btn-subtitle-settings-close">
            关闭
          </button>
        </div>
        <form id="subtitle-settings-form" class="subtitle-settings-form">
          <label class="subtitle-settings-field">
            <span class="subtitle-settings-label">字幕字号</span>
            <select id="focus-settings-font-size" class="subtitle-settings-select">
              <option value="small">小</option>
              <option value="medium" selected>中</option>
              <option value="large">大</option>
            </select>
          </label>
          <label class="subtitle-settings-field subtitle-settings-check">
            <input id="focus-settings-show-source" type="checkbox" checked />
            <span>显示原文</span>
          </label>
          <label class="subtitle-settings-field subtitle-settings-check">
            <input id="focus-settings-show-translation" type="checkbox" checked />
            <span>显示译文</span>
          </label>
          <label class="subtitle-settings-field subtitle-settings-check">
            <input id="focus-settings-show-correction" type="checkbox" checked />
            <span>显示纠错</span>
          </label>
          <label class="subtitle-settings-field">
            <span class="subtitle-settings-label">显示条数</span>
            <select id="focus-settings-visible-count" class="subtitle-settings-select">
              <option value="1">1 条</option>
              <option value="3">3 条</option>
              <option value="5" selected>5 条</option>
              <option value="10">10 条</option>
              <option value="0">全部</option>
            </select>
          </label>
          <p id="focus-settings-error" class="subtitle-settings-error hidden"></p>
          <div class="subtitle-settings-actions">
            <button id="btn-subtitle-settings-apply" type="submit" class="btn-subtitle-settings-apply">
              应用
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="history-overlay" class="history-overlay hidden" aria-hidden="true">
      <div class="history-panel">
        <div class="history-header">
          <h2>历史会话</h2>
          <button id="btn-history-close" type="button" class="btn-history-close">关闭</button>
        </div>
        <div class="history-body">
          <aside id="history-list" class="history-list">
            <div class="empty-state">加载中…</div>
          </aside>
          <section id="history-detail" class="history-detail">
            <div class="empty-state">选择一条历史记录查看详情</div>
          </section>
        </div>
      </div>
    </div>
    <script src="/glossary.js"></script>
    <script src="/demo-scenarios/scenarios.js"></script>
    <script src="/tts.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
